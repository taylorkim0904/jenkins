name: Deploy with DockerHub to Ubuntu Server
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set gradlew permissions
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H 13.124.207.154 >> ~/.ssh/known_hosts

      - name: Deploy on server using Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@13.124.207.154 "cd ~/app && docker compose pull && docker compose up -d"
