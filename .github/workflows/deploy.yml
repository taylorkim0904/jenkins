name: Deploy with DockerHub to Ubuntu Server

on:
  push:
    #브런치 => main에서 Commit 
    branches:
      - main
# Commit시에 작업 
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 현재 repository 안에서 체크 아웃 설정 
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          # Java JDK17 설치 및 환경변수 => 17버전으로 빌드하기 위한 설정 

        # gradlew => 우분투에서 실행 권한이 없는 경우 => 실행 권한 추가 
        # +r(읽기) +w(쓰기) +x(실행) 
      - name: Set gradlew permissions
        run: chmod +x ./gradlew
       
      - name: Build with Gradle
        run: ./gradlew clean build
        # .jar파일 생성 => clean은 전체 삭제 => 다시 build

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        # docker 로그인 

        # docker build : image를 생성 => dockerhub에 전송  
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-jenkins:latest

      # SSH => 개인키를 가지고 AWS에 접속 후 배포
      # appleboy/ssh-action => SSH 키 처리를 내부에서 자동으로 해줌
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.124.207.154
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/app
            docker compose pull
            docker compose up -d
